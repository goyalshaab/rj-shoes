<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | RJ Shoes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#2563eb,#0f172a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:430px;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
animation:popup .5s;

}

@keyframes popup{

from{

transform:scale(.7);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

.container h1{

text-align:center;
color:#2563eb;
margin-bottom:10px;

}

.container p{

text-align:center;
color:#666;
margin-bottom:25px;

}

.input-box{

position:relative;
margin-bottom:18px;

}

.input-box i{

position:absolute;
left:15px;
top:16px;
color:#666;

}

.input-box input{

width:100%;
padding:14px 14px 14px 45px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;

}

.input-box input:focus{

border-color:#2563eb;

}

button{

width:100%;
padding:15px;
background:#2563eb;
color:#fff;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;

}

button:hover{

background:#0f172a;

}

.bottom{

text-align:center;
margin-top:20px;

}

.bottom a{

text-decoration:none;
color:#2563eb;
font-weight:bold;

}

.bottom a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="container">

<h1>RJ Shoes</h1>

<p>Create Your Account</p>

<form onsubmit="createAccount(event)">

<div class="input-box">

<i class="fa fa-user"></i>

<input
type="text"
id="name"
placeholder="Full Name"
required>

</div>

<div class="input-box">

<i class="fa fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa fa-phone"></i>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

</div>

<div class="input-box">

<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="Create Password"
required>

</div>

<div class="input-box">

<i class="fa fa-lock"></i>

<input
type="password"
id="confirm"
placeholder="Confirm Password"
required>

</div>

<button type="submit">

Create Account

</button>

</form>

<div class="bottom">

Already have an account?

<a href="index.html">

Login

</a>

</div>

</div>

<script>

function createAccount(event){

event.preventDefault();

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

if(password!==confirm){

alert("Passwords do not match.");

return;

}

alert("Account Created Successfully!");

window.location.href="index.html";

}

</script>

</body>

</html>
